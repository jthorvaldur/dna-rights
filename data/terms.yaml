# terms.yaml — Natural rights term database
# Each term has: biological equivalent, framework (legal/natural), jurisdiction, implication.
# New terms are generated by LLM and appended here.
# Source: dna-rights conceptual framework (natural rights vs legal constructs)

children:
  biological: offspring
  framework: legal
  jurisdiction: State family court — treats the relationship as a legal construct
    subject to judicial modification.
  implication: Accepting 'children' accepts the court's jurisdiction over the relationship.
offspring:
  biological: offspring
  framework: natural
  jurisdiction: Natural law — the relationship is a biological fact not subject to
    court adjudication.
  implication: Asserting 'offspring' asserts a biological fact the court did not create
    and cannot destroy.
custody:
  biological: natural bond
  framework: legal
  jurisdiction: Statutory — 750 ILCS 5/602.5 allocates 'parenting time' as a divisible
    commodity.
  implication: Accepting 'custody' treats the parent-offspring bond as property to
    be allocated by a judge.
natural bond:
  biological: natural bond
  framework: natural
  jurisdiction: Natural law — the bond exists by biology and is not subject to allocation.
  implication: The bond is not divisible. It exists in full for both biological parents.
visitation:
  biological: access to offspring
  framework: legal
  jurisdiction: Statutory — the court grants 'permission' to see your own biological
    offspring.
  implication: Accepting 'visitation' implies you need the court's permission to access
    your own offspring.
access to offspring:
  biological: access to offspring
  framework: natural
  jurisdiction: Natural right — access to one's biological offspring is inherent,
    not granted.
  implication: No court permission is required to access your own biological offspring.
guardian:
  biological: parent
  framework: legal
  jurisdiction: Court-appointed — implies authority delegated by the state.
  implication: A 'guardian' holds a legal title granted by the court. A parent holds
    a natural bond.
parent:
  biological: parent
  framework: natural
  jurisdiction: Biological fact — established by DNA, not by court appointment.
  implication: Parentage is not a title granted by any authority. It is a fact of
    nature.
ward:
  biological: offspring
  framework: legal
  jurisdiction: Court-created — the offspring is treated as a subject of the court's
    authority.
  implication: A 'ward' belongs to the court's jurisdiction. Offspring belong to their
    biological parents.
best interest of the child:
  biological: natural right of the parent-offspring bond
  framework: legal
  jurisdiction: Statutory — a standard defined and applied by the court with broad
    discretion.
  implication: The court decides what is 'best' — substituting judicial judgment for
    the natural bond.
termination of parental rights:
  biological: attempted severance of a biological bond
  framework: legal
  jurisdiction: Statutory — the court purports to end a relationship it did not create.
  implication: The legal status may be terminated. The biological bond cannot be.
child support:
  biological: parental obligation to offspring
  framework: legal
  jurisdiction: Statutory — state-enforced financial obligation.
  implication: The natural duty to provide for offspring exists independent of any
    court order.
parenting time:
  biological: time with offspring
  framework: legal
  jurisdiction: Statutory — varies by state, e.g., 750 ILCS 5/602.7 (Illinois), Cal.
    Fam. Code § 3100 (California)
  implication: Accepting this term submits to court jurisdiction over when and how
    biological parents may spend time with their own offspring. The court assumes
    authority to regulate the natural parent-child relationship through schedules
    and conditions.
ask:
  biological: inquire
  framework: natural
  jurisdiction: Natural law - fundamental communication between beings
  implication: Asking is a natural act of communication that exists independently
    of any legal framework. Using this term asserts natural human interaction that
    requires no court permission or legal standing to exercise.
take:
  biological: seize offspring from biological parent
  framework: legal
  jurisdiction: Statutory — varies by state family code provisions
  implication: Accepting this term acknowledges the state's authority to remove children
    from their natural parents through legal process. Asserting biological parentage
    challenges the state's jurisdiction to interfere with the natural parent-child
    relationship.
